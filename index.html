<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYSLabs - AI Solutions for Norway</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 10px;
            background-color: #161b22;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            color: #58a6ff;
            font-size: 3rem;
            margin-bottom: 5px;
            letter-spacing: 3px;
        }
        .tagline {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        .status {
            color: #f0883e;
            font-weight: bold;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
        .highlight {
            color: #7ee787;
            font-weight: bold;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #484f58;
            border-top: 1px solid #30363d;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EYSLabs</h1>

        <p class="status">⚡ [ system_initialization: ELA ] ⚡</p>

</html>
