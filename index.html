<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYSLabs - AI Solutions for Norway</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace; /* Yazılımcı ruhu */
            background-color: #0d1117; /* GitHub koyu tema rengi */
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 10px;
            background-color: #161b22;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 {
            color: #58a6ff; /* Mavi, zeka ve güven rengi */
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .status {
            color: #f0883e; /* Turuncu, dikkat çekici */
            font-weight: bold;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .highlight {
            color: #7ee787; /* Yeşil, başarı ve doğa */
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EYSLabs</h1>
        <p class="status">⚡ [ status: system_initialization ] ⚡</p>
        <p>Hei Norveç! 👋</p>
        <p>Vi bygger fremtidens <span class="highlight">kunstig intelligens</span> (AI)</p>
        <p>løsninger for lokale bedrifter.</p>
        <p><strong>Solveig</strong> er snart klar...</p>
        <div class="footer">
            <p>EYSLabs.com | © 2024</p>
            <p style="font-size: 0.8rem;">Powered by M5 Local AI Platform</p>
        </div>
    </div>
</body>
</html>
